name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing — no NPM_TOKEN needed
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      # OIDC trusted publishing needs npm >= 11.5.1
      - run: npm install -g npm@latest
      # Authenticates via GitHub OIDC (no token); prepublishOnly runs
      # lint:types + test + build; provenance is automatic.
      - run: npm publish --access public
