<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 524" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-labelledby="pareto-query-title pareto-query-desc">
  <title id="pareto-query-title">Fuzzy search libraries: MRR vs query latency, index prebuilt</title>
  <desc id="pareto-query-desc">Scatter plot of eleven configurations of eight JavaScript fuzzy search libraries comparing MRR (accuracy) against query milliseconds with indexes prebuilt, on a log scale, on the mixed 10k corpus. The Pareto frontier is all Krino: from krino (0.57 MRR at 0.14 ms) to krino (acronym) (0.62 at 0.16 ms) — every other configuration, including Fuse.js, is dominated on this ledger.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#898781"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="524" fill="#1a1a19"/>
  <text x="66" y="28" fill="#ffffff" font-size="18" font-weight="600">Accuracy vs. query speed</text>
  <text x="66" y="47" fill="#c3c2b7" font-size="13">MRR (accuracy) vs. query ms — index prebuilt at load · log scale · mixed 10k corpus · 10 test queries</text>
  <g>
    <line x1="94.1" y1="62" x2="94.1" y2="434" stroke="#2c2c2a"/>
    <line x1="181.5" y1="62" x2="181.5" y2="434" stroke="#2c2c2a"/>
    <line x1="297" y1="62" x2="297" y2="434" stroke="#2c2c2a"/>
    <line x1="384.3" y1="62" x2="384.3" y2="434" stroke="#2c2c2a"/>
    <line x1="471.7" y1="62" x2="471.7" y2="434" stroke="#2c2c2a"/>
    <line x1="587.2" y1="62" x2="587.2" y2="434" stroke="#2c2c2a"/>
    <line x1="674.5" y1="62" x2="674.5" y2="434" stroke="#2c2c2a"/>
    <line x1="761.9" y1="62" x2="761.9" y2="434" stroke="#2c2c2a"/>
    <line x1="66" y1="434" x2="790" y2="434" stroke="#2c2c2a"/>
    <line x1="66" y1="356.5" x2="790" y2="356.5" stroke="#2c2c2a"/>
    <line x1="66" y1="279" x2="790" y2="279" stroke="#2c2c2a"/>
    <line x1="66" y1="201.5" x2="790" y2="201.5" stroke="#2c2c2a"/>
    <line x1="66" y1="124" x2="790" y2="124" stroke="#2c2c2a"/>
  </g>
  <line x1="66" y1="434" x2="790" y2="434" stroke="#383835"/>
  <line x1="66" y1="62" x2="66" y2="434" stroke="#383835"/>
  <g>
    <text x="94.1" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.1</text>
    <text x="181.5" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.2</text>
    <text x="297" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.5</text>
    <text x="384.3" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">1</text>
    <text x="471.7" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">2</text>
    <text x="587.2" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">5</text>
    <text x="674.5" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">10</text>
    <text x="761.9" y="452" text-anchor="middle" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">20</text>
  </g>
  <g>
    <text x="54" y="438" text-anchor="end" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.2</text>
    <text x="54" y="360.5" text-anchor="end" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.3</text>
    <text x="54" y="283" text-anchor="end" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.4</text>
    <text x="54" y="205.5" text-anchor="end" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.5</text>
    <text x="54" y="128" text-anchor="end" fill="#898781" font-size="12" font-variant-numeric="tabular-nums">0.6</text>
  </g>
  <text x="428" y="479" text-anchor="middle" fill="#c3c2b7" font-size="13">query ms — index prebuilt, log scale (lower = faster) →</text>
  <text transform="translate(18,248) rotate(-90)" text-anchor="middle" fill="#c3c2b7" font-size="13">MRR — mean reciprocal rank (higher = more accurate) →</text>
  <path d="M136.5 147.3 L153.4 108.5" fill="none" stroke="#199e70" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  <g transform="translate(78,70)">
    <line x1="34" y1="24" x2="4" y2="4" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="40" y="20" fill="#898781" font-size="12" font-style="italic">faster &amp; more accurate</text>
  </g>
  <g>
