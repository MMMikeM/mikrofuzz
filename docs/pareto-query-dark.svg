  <g>
    <text x="166.9" y="100.5" text-anchor="start" fill="#ffffff" font-size="12.5" font-weight="600">krino (acronym)</text>
    <text x="707.1" y="132.3" text-anchor="middle" fill="#898781" font-size="12.5">Fuse.js</text>
    <text x="405.2" y="143.5" text-anchor="start" fill="#898781" font-size="12.5">@nozbe/microfuzz</text>
    <text x="150" y="163.3" text-anchor="start" fill="#ffffff" font-size="12.5" font-weight="600">krino</text>
    <text x="723.4" y="167.3" text-anchor="middle" fill="#898781" font-size="12.5">Fuse.js (all opts)</text>
    <text x="505.5" y="236.5" text-anchor="start" fill="#898781" font-size="12.5">fuzzy</text>
    <text x="181.7" y="290.8" text-anchor="start" fill="#898781" font-size="12.5">fuzzysort</text>
    <text x="527.1" y="352.8" text-anchor="start" fill="#898781" font-size="12.5">match-sorter</text>
    <text x="633.1" y="376" text-anchor="start" fill="#898781" font-size="12.5">fast-fuzzy</text>
    <text x="181.7" y="391.5" text-anchor="start" fill="#898781" font-size="12.5">uFuzzy (latinize)</text>
    <text x="181.7" y="422.5" text-anchor="start" fill="#898781" font-size="12.5">uFuzzy</text>
  </g>
  <g>
    <line x1="66" y1="508" x2="92" y2="508" stroke="#199e70" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <text x="100" y="512" fill="#c3c2b7" font-size="12.5">Pareto frontier</text>
    <circle cx="222" cy="508" r="6.5" fill="#3987e5"/>
    <text x="234" y="512" fill="#c3c2b7" font-size="12.5">krino</text>
    <circle cx="310" cy="508" r="6.5" fill="#199e70"/>
    <text x="322" y="512" fill="#c3c2b7" font-size="12.5">other Pareto-optimal</text>
    <circle cx="480" cy="508" r="6.5" fill="#8f8d86"/>
