<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 524" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-labelledby="pareto-query-title pareto-query-desc">
  <title id="pareto-query-title">Fuzzy search libraries: MRR vs query latency, index prebuilt</title>
  <desc id="pareto-query-desc">Scatter plot of eleven configurations of eight JavaScript fuzzy search libraries comparing MRR (accuracy) against query milliseconds with indexes prebuilt, on a log scale, on the mixed 10k corpus. The Pareto frontier is all Krino: from krino (0.77 MRR at 0.09 ms) to krino (acronym) (0.81 at 0.09 ms) — every other configuration, including Fuse.js, is dominated on this ledger.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#898781"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="524" fill="#fcfcfb"/>
  <text x="66" y="28" fill="#0b0b0b" font-size="18" font-weight="600">Accuracy vs. query speed</text>
  <text x="66" y="47" fill="#52514e" font-size="13">MRR (accuracy) vs. query ms — index prebuilt at load · log scale · mixed 10k corpus · 13 test queries</text>
