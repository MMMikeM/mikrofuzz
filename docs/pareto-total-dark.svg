<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 524" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-labelledby="pareto-total-title pareto-total-desc">
  <title id="pareto-total-title">Fuzzy search libraries: MRR vs total cost (index + one query)</title>
  <desc id="pareto-total-desc">Scatter plot of eleven configurations of eight JavaScript fuzzy search libraries comparing MRR (accuracy) against total milliseconds for one cold search (index build plus one query) on a log scale, on the mixed 10k corpus. The Pareto frontier runs uFuzzy, uFuzzy (latinize), krino, krino (acronym) — the two krino configurations share one pooled build cost and differ only in query time; fuzzysort's hidden prepare cache moves it off this frontier, and Fuse.js is dominated — krino (acronym) is more accurate and ~10× cheaper.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#898781"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="524" fill="#1a1a19"/>
  <text x="66" y="28" fill="#ffffff" font-size="18" font-weight="600">Accuracy vs. total one-shot cost</text>
  <text x="66" y="47" fill="#c3c2b7" font-size="13">MRR (accuracy) vs. total ms (index + one query) · log scale · mixed 10k corpus · 13 test queries</text>
