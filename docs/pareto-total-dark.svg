    <line x1="66" y1="385.7" x2="790" y2="385.7" stroke="#2c2c2a"/>
    <line x1="66" y1="337.4" x2="790" y2="337.4" stroke="#2c2c2a"/>
    <line x1="66" y1="289.1" x2="790" y2="289.1" stroke="#2c2c2a"/>
