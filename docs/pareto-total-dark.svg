    <circle cx="620.9" cy="147.3" r="6.5" fill="#8f8d86" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
    <circle cx="646.1" cy="147.3" r="6.5" fill="#8f8d86" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
    <circle cx="402" cy="232.5" r="6.5" fill="#8f8d86" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
    <circle cx="73.8" cy="286.8" r="6.5" fill="#199e70" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
    <circle cx="426.4" cy="348.8" r="6.5" fill="#8f8d86" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
    <circle cx="757.7" cy="372" r="6.5" fill="#8f8d86" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
    <circle cx="266.8" cy="387.5" r="6.5" fill="#8f8d86" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
    <circle cx="94.6" cy="418.5" r="6.5" fill="#8f8d86" fill-opacity="0.9" stroke="#1a1a19" stroke-width="1.5"/>
  </g>
  <g>
    <text x="364.8" y="100.5" text-anchor="start" fill="#ffffff" font-size="12.5" font-weight="600">krino (acronym)</text>
    <text x="620.9" y="132.3" text-anchor="middle" fill="#898781" font-size="12.5">Fuse.js</text>
    <text x="545.2" y="143.5" text-anchor="end" fill="#898781" font-size="12.5">@nozbe/microfuzz</text>
    <text x="343" y="163.3" text-anchor="end" fill="#ffffff" font-size="12.5" font-weight="600">krino (smart)</text>
    <text x="646.1" y="167.3" text-anchor="middle" fill="#898781" font-size="12.5">Fuse.js (all opts)</text>
    <text x="415.5" y="236.5" text-anchor="start" fill="#898781" font-size="12.5">fuzzy</text>
    <text x="87.3" y="290.8" text-anchor="start" fill="#ffffff" font-size="12.5" font-weight="600">fuzzysort</text>
    <text x="439.9" y="352.8" text-anchor="start" fill="#898781" font-size="12.5">match-sorter</text>
    <text x="744.2" y="376" text-anchor="end" fill="#898781" font-size="12.5">fast-fuzzy</text>
    <text x="280.3" y="391.5" text-anchor="start" fill="#898781" font-size="12.5">uFuzzy (latinize)</text>
    <text x="108.1" y="422.5" text-anchor="start" fill="#898781" font-size="12.5">uFuzzy</text>
  </g>
  <g>
    <line x1="66" y1="508" x2="92" y2="508" stroke="#199e70" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <text x="100" y="512" fill="#c3c2b7" font-size="12.5">Pareto frontier</text>
    <circle cx="222" cy="508" r="6.5" fill="#3987e5"/>
    <text x="234" y="512" fill="#c3c2b7" font-size="12.5">krino</text>
    <circle cx="310" cy="508" r="6.5" fill="#199e70"/>
    <text x="322" y="512" fill="#c3c2b7" font-size="12.5">other Pareto-optimal</text>
    <circle cx="480" cy="508" r="6.5" fill="#8f8d86"/>
